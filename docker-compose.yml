version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    container_name: openbrain-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openbrain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openbrain_secret_pass}
      POSTGRES_DB: ${POSTGRES_DB:-openbrain_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - openbrain-db-data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d

volumes:
  openbrain-db-data:
